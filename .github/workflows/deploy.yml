name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # GitHub OIDC for AWS auth

jobs:
  # ── バックエンド → AWS CDK deploy ──────────────────────────────
  deploy-backend:
    name: Deploy Backend (CDK)
    runs-on: ubuntu-latest
    environment: production  # 本番環境ルールを適用（requires approval）

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: CDK synth (security check included via cdk-nag)
        working-directory: cdk
        run: npx cdk synth

      - name: CDK deploy
        working-directory: cdk
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: |
          npx cdk deploy --all --require-approval never \
            --context githubPagesUrl=$PAGES_URL
