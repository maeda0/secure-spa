name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # GitHub OIDC for AWS auth

jobs:
  # ── フロントエンド → GitHub Pages ──────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh-pages branch への push に必要

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_DEFAULT_REPO: ${{ secrets.VITE_DEFAULT_REPO }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          force_orphan: true

  # ── バックエンド → AWS CDK deploy ──────────────────────────────
  deploy-backend:
    name: Deploy Backend (CDK)
    runs-on: ubuntu-latest
    environment: production  # 本番環境ルールを適用（requires approval）

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: CDK synth (security check included via cdk-nag)
        working-directory: cdk
        run: npx cdk synth

      - name: CDK deploy
        working-directory: cdk
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: |
          npx cdk deploy --all --require-approval never \
            --context githubPagesUrl=$PAGES_URL
